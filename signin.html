<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Janak Foods</title>
    <style>
        /* BASE STYLES & TYPOGRAPHY */
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #fdf6ec; /* Warm, premium light cream background */
            color: #2b1b17;
            padding-top: 75px; 
            padding-bottom: 80px;
            
        }

        /* PREMIUM NAVBAR */
        .navbar {
            position: fixed;
            background-color: #f7e7ce; /* Matches the warm header style */
            left: 0;
            top: 0;
            display: flex;
            align-items: center;
            width: 100%;
            height: 75px;
            padding: 0 10%;
            border-bottom: 1px solid rgba(0,0,0,0.05);
            box-shadow: 0px 2px 10px rgba(0,0,0,0.05);
            box-sizing: border-box;
            z-index: 1000;
        }

        .navbar-logo {
            width: 50px;
            height: 50px;
            object-fit: contain;
        }

        .navbar-links {
            display: flex;
            align-items: center;
            gap: 30px;
            margin-left: 40px;
            margin-right: auto;
        }

        .navbar-links a {
            color: #2b1b17;
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
            letter-spacing: 0.5px;
            transition: color 0.2s;
        }

        .navbar-links a:hover {
            color: #8b5a2b;
        }

        .search-form {
            display: flex;
            align-items: center;
        }

        .search-input {
            width: 220px;
            height: 38px;
            padding: 0 15px;
            border-radius: 20px 0 0 20px;
            border: 1px solid #dcd1c4;
            border-right: none;
            background-color: #fff;
            box-sizing: border-box;
            outline: none;
        }

        .search-button {
            height: 38px;
            padding: 0 20px;
            border-radius: 0 20px 20px 0;
            border: 1px solid #dcd1c4;
            background-color: #2b1b17;
            color: #fff;
            font-weight: 600;
            cursor: pointer;
            box-sizing: border-box;
            transition: background 0.2s;
        }

        .search-button:hover {
            background-color: #4a322c;
        }

        /* FORM PAGE CONTAINER (Flex centering magic) */
        .form-wrapper {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px 10%;
        }

        .auth-cards {
            background-color: #ffffff;
            padding: 40px;
            border-radius: 16px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 30px rgba(43, 27, 23, 0.04);
            box-sizing: border-box;
        }

        .auth-cards h2 {
            margin: 0 0 8px 0;
            font-size: 28px;
            font-weight: 800;
            text-align: center;
        }

        .auth-cards p {
            margin: 0 0 24px 0;
            color: #6e5d59;
            font-size: 14px;
            text-align: center;
        }

        /* INPUT GROUPS */
        .forms-groups {
            display: flex;
            flex-direction: column;
            margin-bottom: 20px;
        }

        .forms-groups label {
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 6px;
            color: #8b5a2b;
            letter-spacing: 0.5px;
        }

        .forms-groups input {
            height: 44px;
            padding: 0 14px;
            border-radius: 8px;
            border: 1px solid #dcd1c4;
            background-color: #fff;
            font-size: 15px;
            outline: none;
            box-sizing: border-box;
            transition: border-color 0.2s;
        }

        .forms-groups input:focus {
            border-color: #8b5a2b;
            box-shadow: 0 0 0 3px rgba(139, 90, 43, 0.1);
        }

        /* ACTION BUTTON */
        .submits-btn {
            width: 100%;
            height: 46px;
            background-color: #2b1b17;
            color: #ffffff;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
            margin-top: 10px;
        }

        .submits-btn:hover {
            background-color: #4a322c;
        }

        .submits-btn:active {
            transform: scale(0.98);
        }

        .auth-footer-texts {
            margin-top: 20px;
            font-size: 13px;
            text-align: center;
            color: #6e5d59;
        }

        .auth-footer-texts a {
            color: #8b5a2b;
            text-decoration: none;
            font-weight: 600;
        }

        .auth-footer-texts a:hover {
            text-decoration: underline;
        }

        

        /* FOOTER */
        footer {
            background-color: #2b1b17; 
            color: #f7e7ce;            
            padding: 25px 10%;
            position: fixed; 
            bottom: 0;
            left: 0;
            width: 100%;
            box-sizing: border-box;
            z-index: 1000;
            border-top: 1px solid rgba(255,255,255,0.05);
        }

        .footer-content {
            display: flex;
            justify-content: space-between; 
            align-items: center;            
            max-width: 1200px;
            margin: 0 auto;
        }

        .footer-logo {
            font-weight: 700;
            font-size: 18px;
            letter-spacing: 0.5px;
        }

        .footer-links a {
            margin: 0 15px;
            color: #dcd1c4;
            text-decoration: none;
            font-size: 14px;
            transition: color 0.2s;
        }

        .footer-links a:hover {
            color: #fff;
        }

        .footer-copy {
            font-size: 13px;
            color: #9c8e8a;
        }

        /* RESPONSIVE STYLES */
        @media (max-width: 992px) {
            .hero-container {
                flex-direction: column;
                text-align: center;
                gap: 40px;
            }
            .features-grid {
                grid-template-columns: 1fr;
                gap: 25px;
            }
        }

        @media (max-width: 768px) {
            body { padding-top: 0; padding-bottom: 0; }
            .navbar {
                position: relative; 
                height: auto; 
                padding: 20px 5%;
                flex-direction: column;
                gap: 15px;
            }
            .navbar-links {
                margin: 0;
                gap: 20px;
            }
            .search-form { width: 100%; }
            .search-input { flex-grow: 1; }
            footer { position: relative; padding: 30px 5%; }
            .footer-content {
                flex-direction: column;
                gap: 15px;
                text-align: center;
            }
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <img src="Logo.png" alt="Janak" class="navbar-logo">
        <div class="navbar-links">  
            <a href="about.html">ABOUT</a>
           
            <a href="signin.html">SIGN IN</a>
            <a href="signup.html">SIGN UP</a>
        </div>
        <form action="/search" method="get" class="search-form">
            <input type="text" name="query" placeholder="Search items..." required class="search-input">
            <button type="submit" class="search-button">Search</button>
        </form>
    </nav>

    
    <div class="form-wrapper">
        <div class="auth-cards">
            <h2>WELCOME BACK!</h2>
            <p>Fill the details to SIGN IN your account</p>

            <form id="signinForm">
                <div class="forms-groups">
                    <label for="UserName">FULL NAME</label>
                    <input type="text" id="FullName" placeholder="ENTER NAME" name="fullname"  required autocomplete="name">
                </div>

                <div class="forms-groups">
                <label for="email"> Enetr email</label>
                <input type="text" name="email" id="email" placeholder="user@email" required autocomplete="email">
                </div>

                <div class="forms-groups">
                    <label for="PASSWORD">
                        ENTER PASSWORD
                    </label>
                    <input type="text" id="password" placeholder="ENTER PASSWORD" name="password" required>
                </div>

                <button type="submit" class="submit-btn">SIGN IN</button>
            </form>
            <div class="auth-footer-texts">
                New to Janak Foods? <a href="signup.html">Sign Up</a>

        </div>
    </div>

  
    <footer>
        <div class="footer-content">
            <div class="footer-logo">Janak Foods</div>
            <div class="footer-links">
                <a href="#">Privacy Policy</a>
                <a href="#">Terms of Service</a>
                <a href="#">Support</a>
            </div>
            <div class="footer-copy">&copy; 2026 Janak Foods. All rights reserved.</div>
        </div>
    </footer>

     <script>
    // 1. Get the form element by its ID
    const signinForm = document.getElementById('signinForm');

    // 2. Add the listener to the form
    signinForm.addEventListener('submit', function(e) {
        // 3. This MUST be inside the function to work
        e.preventDefault(); 
        
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;

        // 4. Verify against stored data
        if (localStorage.getItem('userEmail') === email && localStorage.getItem('userPass') === password) {
            alert("Welcome back!");
            // Check your filename! If your homepage file is index.html, use that.
            window.location.href = "Home.html"; 
        } else {
            alert("Email or password incorrect.");
        }
    });
</script>

</body>
</html>
